name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies (Windows)
        run: |
          cargo install tauri-cli --version "^2.0"
          npm install

      - name: Build Tauri App
        run: |
          npm run tauri:build -- --bundles nsis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cw-master-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/cw-master.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/cw-master.exe
          body: |
            ## CW Master - Morse Code Encoder/Decoder

            **基于 web-deep-cw-decoder by e04 (MIT License)**
            **二创: BY4CWY**

            ### 功能
            - Morse Code 编码 (文本 → 音频)
            - 深度学习解码 (CRNN+CTC)
            - 贝叶斯自适应解码
            - 呼号预设切换 (BH4DUF / BY4CWY)

            ### 使用方法
            1. 下载 `cw-master.exe` 或安装程序
            2. 直接运行，无需安装
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
